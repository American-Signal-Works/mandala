name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  cli:
    name: CLI (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      MANDALA_BIN_DIR: ${{ runner.temp }}/mandala-bin
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: CLI checks
        run: pnpm --filter @workspace/cli lint && pnpm --filter @workspace/cli typecheck && pnpm --filter @workspace/cli test

      - name: Link CLI
        run: pnpm cli:link

      - name: Verify linked command
        shell: pwsh
        run: |
          $launcher = if ($IsWindows) { "mandala.cmd" } else { "mandala" }
          & (Join-Path $env:MANDALA_BIN_DIR $launcher) help --json

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter web typecheck

      - name: Lint
        run: pnpm --filter web lint

      - name: Unit tests
        run: pnpm --filter web test

      # E2E uses local Supabase via the supabase CLI
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.95.4

      - name: Start local Supabase
        run: supabase start

      - name: Seed env for E2E
        run: |
          supabase status -o json | jq -r '"NEXT_PUBLIC_SUPABASE_URL=" + .API_URL, "NEXT_PUBLIC_SUPABASE_ANON_KEY=" + .ANON_KEY, "SUPABASE_SERVICE_ROLE_KEY=" + .SERVICE_ROLE_KEY' > apps/web/.env.local

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm test:e2e

      - name: Build for Lighthouse
        run: pnpm --filter web build

      - name: Lighthouse CI
        run: pnpm dlx @lhci/cli@latest autorun
