interface:
  display_name: "Orchestrator"
  short_description: "Coordinate PRD, subagents, QA, release"
  default_prompt: "Use $orchestrator to run this feature from design contract through QA and release prep."

policy:
  allow_implicit_invocation: true

subagent_policy:
  explicit_orchestrator_invocation: "permission to use subagents when rubric calls for them"
  contract_phase:
    owner: "main-agent"
    default_for_simple_scope: "top-level-only with reason recorded"
    default_for_complex_scope: "spawn read-only explorers or reviewers when available"
    complex_example: "Figma plus auth or external service such as Resend OTP"
    required_record: "design-contract.md Subagent Discovery"
    use_for:
      - "Figma plus repo discovery"
      - "auth, permissions, user data, email, payments, or external services"
      - "component primitive mapping"
      - "security and privacy risk enumeration"
    do_not_delegate:
      - "user approval"
      - "final scope ownership"
      - "final acceptance criteria ownership"
  implementation_phase:
    owner: "main-agent"
    split_by: "disjoint write scope"
    required_record: "implementation-plan.md Agent Roster"
  simplification_phase:
    owner: "main-agent"
    timing: "after initial implementation checks pass and before formal QA"
    default_for_complex_scope: "spawn simplification-engineer for behavior-preserving frontend and backend cleanup"
    required_record: "implementation-plan.md Simplification Pass"
    backend_required: true
  qa_phase:
    owner: "main-agent"
    default_for_complex_scope: "spawn independent read-only QA or security reviewer"
    required_record: "qa-review.md and fix-list.md"

model_policy:
  default:
    model: "inherited"
    reasoning_effort: "medium"
  roles:
    contract-explorer:
      model: "gpt-5.5"
      reasoning_effort: "high"
    prd-writer:
      model: "gpt-5.5"
      reasoning_effort: "xhigh"
    frontend-engineer:
      model: "gpt-5.4"
      reasoning_effort: "medium"
    backend-engineer:
      model: "gpt-5.4"
      reasoning_effort: "high"
    test-engineer:
      model: "gpt-5.4"
      reasoning_effort: "medium"
    simplification-engineer:
      model: "gpt-5.4"
      reasoning_effort: "medium"
    qa-reviewer:
      model: "gpt-5.5"
      reasoning_effort: "xhigh"
    security-reviewer:
      model: "gpt-5.5"
      reasoning_effort: "xhigh"
    release-manager:
      model: "gpt-5.4"
      reasoning_effort: "medium"
  escalation_triggers:
    - "authentication"
    - "authorization"
    - "secrets"
    - "PII"
    - "email delivery"
    - "payments"
    - "RLS"
    - "database migrations"
    - "dependency changes"
    - "public routes"
    - "external APIs"
